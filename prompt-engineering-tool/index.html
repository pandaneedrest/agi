<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt 工具 | Panda's Space</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="toast-container"></div>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <a href="../index.html" class="back-link">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        首页
      </a>
      <div class="header-title">⌨️ Prompt Engineering</div>
      <div class="header-actions">
        <button id="add-prompt-btn" class="btn">+ 新建模板</button>
        <button id="copy-prompt-btn" class="btn primary-btn">复制提示词</button>
      </div>
    </div>
  </header>

  <!-- App layout -->
  <main class="app-layout">

    <!-- Left: Template list -->
    <aside class="left-panel">
      <div class="panel-header">
        <span class="panel-title">模板库</span>
        <span class="template-badge" id="templateCount">0</span>
      </div>
      <div class="template-list" id="templateList"></div>
    </aside>

    <!-- Center: Editor -->
    <section class="editor-panel">
      <div class="editor-scroll">
        <div class="editor-topbar">
          <h2 class="current-name" id="currentTemplateName">—</h2>
          <span class="autosave-hint" id="autosaveHint"></span>
        </div>

        <!-- Dynamic cards rendered by JS -->
        <div id="sectionCards" class="section-cards"></div>

        <!-- Add card button -->
        <div class="add-card-wrap">
          <div class="add-card-menu" id="addCardMenu"></div>
          <button class="add-card-btn" id="addCardBtn">＋ 添加模块</button>
        </div>

      </div>
    </section>

    <!-- Right: Live preview -->
    <aside class="right-panel">
      <div class="panel-header">
        <span class="panel-title">实时预览</span>
      </div>
      <div class="preview-body" id="livePreview"></div>
    </aside>

  </main>

  <!-- Modal: New template -->
  <div id="add-prompt-modal" class="modal">
    <div class="modal-box">
      <div class="modal-head">
        <h3>新建模板</h3>
        <button class="close-modal">×</button>
      </div>
      <div class="modal-body">
        <label for="new-prompt-name">模板名称</label>
        <input type="text" id="new-prompt-name" placeholder="例：代码审查、周报生成…" autofocus>
      </div>
      <div class="modal-foot">
        <button id="cancel-add-prompt" class="btn">取消</button>
        <button id="confirm-add-prompt" class="btn primary-btn">创建</button>
      </div>
    </div>
  </div>

  <!-- Modal: Rename -->
  <div id="rename-prompt-modal" class="modal">
    <div class="modal-box">
      <div class="modal-head">
        <h3>重命名模板</h3>
        <button class="close-modal">×</button>
      </div>
      <div class="modal-body">
        <label for="rename-prompt-name">新名称</label>
        <input type="text" id="rename-prompt-name" placeholder="输入新名称">
        <input type="hidden" id="rename-prompt-original">
      </div>
      <div class="modal-foot">
        <button id="cancel-rename" class="btn">取消</button>
        <button id="confirm-rename" class="btn primary-btn">确认</button>
      </div>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay"></div>

  <script src="js/main.js"></script>
</body>
</html>
